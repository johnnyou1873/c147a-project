# Archived legacy model config.
# Active replacement:
#   model=protenix_style
_target_: src.models.c147a_module.C147ALitModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.OneCycleLR
  _partial_: true
  max_lr: 0.0001
  pct_start: 0.1
  anneal_strategy: cos
  div_factor: 25.0
  final_div_factor: 1000.0

net:
  _target_: src.models.template_assembler.TemplateSegmentAssembler
  hidden_dim: 256
  num_candidates: 20
  residue_vocab_size: 5
  max_chain_embeddings: 64
  max_copy_embeddings: 64
  template_chunk_length: 512
  template_chunk_stride: 256
  template_chunk_max_windows: 64
  seq_transformer_layers: 4
  seq_transformer_heads: 8
  sparse_window: 256
  sparse_mixture_topk: 2
  graph_layers: 3
  graph_offsets: [1, 2, 4, 8, 16]
  transformer_dropout: 0.3
  cross_attention_heads: 8
  refinement_block: se3
  se3_refine_layers: 4
  se3_num_heads: 4
  se3_dropout: 0.1
  se3_coord_step_size: 0.1
  geometric_constraints_enabled: true
  geometric_constraints_strength: 0.75
  geometric_constraints_nonlocal_max_points: 160
  geometric_constraints_nonlocal_min_sep: 2

compile: false
loss_mode: one_minus_lddt
use_permutation_aware_metric: true
must_be_better_weight: 0.5
must_be_better_margin: 0.01
must_be_better_log_scale: 8.0
must_be_better_min_factor: 0.2
must_be_better_max_factor: 3.0
