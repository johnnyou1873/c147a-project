# Archived legacy model config.
# Active replacement:
#   model=protenix_style
_target_: src.models.c147a_module.C147ALitModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.OneCycleLR
  _partial_: true
  max_lr: 0.001
  pct_start: 0.1
  anneal_strategy: cos
  div_factor: 25.0
  final_div_factor: 1000.0

net:
  _target_: src.models.components.folding_transformer.SE3FoldingTransformer
  hidden_dim: 512
  num_layers: 6
  num_heads: 4
  dropout: 0.1
  residue_vocab_size: 5
  max_chain_embeddings: 64
  max_copy_embeddings: 64
  recycling_passes: 4
  coord_step_size: 0.25
  use_fast_multipole: true
  fmm_cell_size: 64
  fmm_near_cell_span: 1
  fmm_exact_threshold: 768
  fmm_max_levels: 4
  fmm_far_topk: 32
  fmm_dynamic_reordering: true
  use_block_sparse_attention: false
  block_sparse_min_seq_len: 512
  block_sparse_block_size: 64
  block_sparse_window: 256
  block_sparse_global_stride: 128
  block_sparse_max_global: 64
  block_sparse_dilation: 1
  block_sparse_geo_topk: 16
  pure_sparse_mode: false

# compile model for faster training with pytorch 2.0
compile: false
loss_mode: improvement_focused_tm
use_permutation_aware_metric: true
must_be_better_weight: 0.5
must_be_better_margin: 0.01
must_be_better_log_scale: 8.0
must_be_better_min_factor: 0.2
must_be_better_max_factor: 3.0
