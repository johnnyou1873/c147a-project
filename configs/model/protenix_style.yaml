_target_: src.models.protenix_style_module.ProtenixStyleLitModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.OneCycleLR
  _partial_: true
  max_lr: 0.001
  pct_start: 0.1
  anneal_strategy: cos
  div_factor: 25.0
  final_div_factor: 1000.0

net:
  _target_: src.models.protenix_style.ProtenixStyleNet
  residue_vocab_size: 5
  max_chain_embeddings: 64
  max_copy_embeddings: 64
  c_s: 256
  c_token: 256
  c_z: 16
  c_m: 16
  template_c: 12
  diffusion_c_a: 256
  num_heads: 4
  dropout: 0.1
  template_blocks: 2
  msa_blocks: 1
  gru_blocks: 8
  pairformer_blocks: 1
  diffusion_blocks: 1
  diffusion_steps: 1
  coord_step_size: 0.1
  triangle_attention_mode: linear
  triangle_feature_map_multiplier: 2
  use_chunked_triangle_multiplication: true
  triangle_multiplication_chunk_size: 64
  diffusion_sampler: ode
  diffusion_eta: 1.0
  use_templates: true
  use_rna_msa: true

compile: false
loss_mode: one_minus_tm
use_permutation_aware_metric: true
must_be_better_weight: 0.5
must_be_better_margin: 0.01
must_be_better_log_scale: 8.0
must_be_better_min_factor: 0.2
must_be_better_max_factor: 3.0
